spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/collabdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:collabuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:collabpass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration-postgresql
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Logging
logging.level.org.springframework.web.socket=DEBUG
logging.level.com.mwang.backend=DEBUG

# Kafka serializers (Spring Boot autoconfigures KafkaTemplate)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Topic names
kafka.topics.document-operations=document-operations
kafka.consumer.group-id.notification=notification-consumer-group

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
info.app.name=collaborative-doc-engine
info.app.description=Real-time collaborative document editing backend

# JWT — set JWT_SECRET env var in any real deployment; never use the default in production
jwt.secret=${JWT_SECRET:PZQhbm2pxG2uTlbcHMxwTB4amG59/+uK+nYbCV/4u4o=}
jwt.expiration-ms=86400000

# Resync rate limit — permits per minute per (user, document)
collaboration.resync.rate-limit=30

# Kafka idempotent producer (outbox poller)
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.acks=all
spring.kafka.producer.retries=2147483647
spring.kafka.producer.properties.delivery.timeout.ms=10000
spring.kafka.producer.compression-type=lz4

# Outbox poller configuration
collaboration.outbox.poll-interval-ms=500
collaboration.outbox.batch-size=100
collaboration.outbox.max-attempts=10
collaboration.outbox.backoff-ms=1000
collaboration.outbox.backoff-cap-ms=60000

# Kafka consumer — explicit offset control (required by DefaultErrorHandler)
spring.kafka.consumer.enable-auto-commit=false
